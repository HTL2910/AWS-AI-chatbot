<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SafeGraph AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🤖 SafeGraph AI</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">💬 Chat</a>
                <a href="/dashboard" class="nav-item active">📊 Dashboard</a>
                <a href="#" class="nav-item">⚙️ Settings</a>
                <a href="#" class="nav-item">📚 Documentation</a>
            </nav>
            <div class="sidebar-footer">
                <p>v1.0.0</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Header -->
            <header class="dashboard-header">
                <h1>Dashboard</h1>
                <div class="header-actions">
                    <button class="btn-secondary" id="refreshBtn">🔄 Refresh</button>
                    <button class="btn-secondary" id="exportBtn">📥 Export</button>
                </div>
            </header>

            <!-- Stats Grid -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-content">
                        <p class="stat-label">Total Tokens</p>
                        <p class="stat-value" id="totalTokens">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">💬</div>
                    <div class="stat-content">
                        <p class="stat-label">Total Messages</p>
                        <p class="stat-value" id="totalMessages">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-content">
                        <p class="stat-label">Avg Tokens/Message</p>
                        <p class="stat-value" id="avgTokens">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <p class="stat-label">API Status</p>
                        <p class="stat-value status-healthy" id="apiStatus">Healthy</p>
                    </div>
                </div>
            </section>

            <!-- Charts Section -->
            <section class="charts-section">
                <div class="chart-card">
                    <h3>Daily Token Usage</h3>
                    <div class="chart-container">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Recent Chats -->
            <section class="recent-section">
                <h3>Recent Conversations</h3>
                <div class="chat-list" id="chatList">
                    <div class="empty-state">No conversations yet</div>
                </div>
            </section>

            <!-- System Info -->
            <section class="system-info">
                <h3>System Information</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Model:</span>
                        <span class="info-value" id="modelInfo">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Region:</span>
                        <span class="info-value" id="regionInfo">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Last Updated:</span>
                        <span class="info-value" id="lastUpdated">-</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
