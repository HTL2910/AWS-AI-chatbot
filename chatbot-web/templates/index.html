<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGraph AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>

    <!-- API Key Modal -->
    <div id="apiKeyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔑 Connect to AWS Bedrock</h2>
                <p>Enter your API key to start chatting with AI</p>
            </div>
            <input 
                type="password" 
                id="apiKeyInput" 
                class="api-key-input" 
                placeholder="Paste your API key here..."
                autocomplete="off"
            >
            <div class="modal-buttons">
                <button id="connectBtn" class="primary-btn">
                    <span class="btn-text">Connect</span>
                    <span class="btn-loader" style="display:none;">⏳</span>
                </button>
                <button id="toggleApiKeyVisibility" class="secondary-btn">👁️ Show</button>
            </div>
            <div id="apiKeyError" class="error-message" style="display:none;"></div>
            <p class="modal-hint">💡 Your API key is stored only in your browser session and never sent to our servers.</p>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div id="chatContainer" class="chat-container" style="display:none;">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <h1>🤖 SafeGraph AI</h1>
                <span class="status-badge">Connected</span>
            </div>
            <div class="header-right">
                <span id="tokenCounter" class="token-counter" title="Total tokens used">
                    <span class="token-icon">📊</span>
                    <span class="token-value">0</span>
                </span>
                <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">⚙️</button>
                <button id="apiKeyBtn" class="icon-btn" title="Change API Key" aria-label="Change API Key">🔑</button>
                <button id="clearBtn" class="icon-btn" title="Clear Chat" aria-label="Clear Chat">🗑️</button>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel" style="display:none;">
            <div class="settings-content">
                <div class="settings-header">
                    <h3>⚙️ Settings</h3>
                    <button id="closeSettings" class="close-btn">✕</button>
                </div>
                <div class="setting-row">
                    <label for="systemPromptInput">System Prompt:</label>
                    <textarea id="systemPromptInput" rows="3" placeholder="Enter system prompt...">You are a helpful AI assistant.</textarea>
                </div>
                <div class="setting-row">
                    <label for="maxTokensSlider">Max Tokens: <span id="maxTokensValue">8192</span></label>
                    <input type="range" id="maxTokensSlider" min="100" max="8192" value="8192" step="100">
                </div>
                <div class="setting-row">
                    <label for="tempSlider">Temperature: <span id="tempValue">0.7</span></label>
                    <input type="range" id="tempSlider" min="0" max="2" value="0.7" step="0.1">
                </div>
            </div>
        </div>

        <!-- Chat Box -->
        <div id="chatBox" class="chat-box"></div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                class="message-input" 
                placeholder="Type your message here..."
                autocomplete="off"
            >
            <button id="sendBtn" class="send-btn" title="Send message (Enter)">
                <span class="send-icon">➤</span>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
